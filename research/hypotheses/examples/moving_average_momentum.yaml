id: moving_average_momentum_v1
name: Moving Average Momentum
description: Simple trend-following test vehicle.
hypothesis_version: 1
market_universe: qualified_us_large_liquid
instrument_type: stock
timeframe: 1d
data_source: eodhd
template: moving_average_momentum
direction: long_only
entry_logic: Long when a fast historical moving average is above a slow historical moving average.
exit_logic: Flat when the fast historical moving average is no longer above the slow average.
holding_period: Parameterized by signal persistence.
expected_edge_reason: >
  Stocks with persistent positive trend may continue over intermediate horizons.
invalidation_rules:
  - Rejected if net test return is not positive after costs.
  - Rejected if performance only exists in one isolated parameter setting.
  - Rejected if walk-forward degradation is excessive.
  - Rejected if trade count is too low.
minimum_evidence:
  min_trades: 20
  min_profitable_split_pct: 0.6
  min_stability_score: 0.5
holding_policy:
  preferred_style: intraday
  allow_intraday: true
  allow_overnight: conditional
  allow_weekend: exceptional_only
  max_holding_sessions: 5
  flatten_before_close_minutes: 10
  entry_cutoff_before_close_minutes: 30
  require_exceptional_evidence_for_swing: true
  require_gap_risk_report: true
  min_swing_excess_vs_benchmark: 0.05
  min_swing_excess_vs_null: 0.03
  min_swing_trade_count: 50
  max_gap_return_contribution_pct: 0.25
  max_weekend_exposure_count: 0
  max_overnight_exposure_count: 0
  max_swing_drawdown: 0.15
parameter_space:
  fast_window: [10, 20, 50]
  slow_window: [100, 150, 200]
  holding_period: [5, 10, 20]
maximum_parameter_sets: 100
costs:
  spread_bps: 2
  commission_bps: 0.5
  slippage_bps: 1
risk:
  max_drawdown: 0.25
walkforward:
  mode: rolling
  train_bars: 500
  test_bars: 125
  embargo_bars: 1
  step_bars: 125
  minimum_rows: 626
created_at: "2026-06-28T00:00:00Z"
