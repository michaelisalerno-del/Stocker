id: pullback_in_uptrend_v1
name: Pullback In Uptrend
description: Educational long-only pullback test vehicle.
hypothesis_version: 1
market_universe: qualified_us_large_liquid
instrument_type: stock
timeframe: 1d
data_source: eodhd
template: pullback_in_uptrend
direction: long_only
entry_logic: Long after a short pullback while price remains above a historical trend average.
exit_logic: Exit after a fixed holding period.
holding_period: Parameterized fixed holding period.
expected_edge_reason: >
  Stocks in established uptrends may mean-revert after short pullbacks.
invalidation_rules:
  - Rejected if net test return is not positive after costs.
  - Rejected if nearby parameter settings do not also work.
  - Rejected if most walk-forward splits fail.
  - Rejected if trade count is too low.
minimum_evidence:
  min_trades: 20
  min_profitable_split_pct: 0.6
  min_stability_score: 0.5
parameter_space:
  trend_window: [50, 100, 150]
  pullback_threshold: [-0.01, -0.02, -0.03]
  holding_period: [3, 5, 10]
maximum_parameter_sets: 100
costs:
  spread_bps: 2
  commission_bps: 0.5
  slippage_bps: 1
risk:
  max_drawdown: 0.25
walkforward:
  mode: rolling
  train_bars: 500
  test_bars: 125
  embargo_bars: 1
  step_bars: 125
  minimum_rows: 626
created_at: "2026-06-28T00:00:00Z"
