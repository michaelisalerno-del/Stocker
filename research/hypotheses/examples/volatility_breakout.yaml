id: volatility_breakout_v1
name: Volatility Breakout
description: Educational long-only breakout test vehicle.
hypothesis_version: 1
market_universe: qualified_us_large_liquid
instrument_type: stock
timeframe: 1d
data_source: eodhd
template: volatility_breakout
direction: long_only
entry_logic: Long when prior close breaks above a prior rolling high plus a range buffer.
exit_logic: Flat when the breakout condition no longer holds.
holding_period: Signal persistence.
expected_edge_reason: >
  Some stocks may continue after historical range expansion and upside breakouts.
invalidation_rules:
  - Rejected if walk-forward test splits fail after costs.
  - Rejected if only one isolated breakout setting works.
  - Rejected if drawdown is unacceptable.
  - Rejected if trade count is too low.
minimum_evidence:
  min_trades: 20
  min_profitable_split_pct: 0.6
  min_stability_score: 0.5
holding_policy:
  preferred_style: intraday
  allow_intraday: true
  allow_overnight: conditional
  allow_weekend: exceptional_only
  max_holding_sessions: 5
  flatten_before_close_minutes: 10
  entry_cutoff_before_close_minutes: 30
  require_exceptional_evidence_for_swing: true
  require_gap_risk_report: true
  min_swing_excess_vs_benchmark: 0.05
  min_swing_excess_vs_null: 0.03
  min_swing_trade_count: 50
  max_gap_return_contribution_pct: 0.25
  max_weekend_exposure_count: 0
  max_overnight_exposure_count: 0
  max_swing_drawdown: 0.15
parameter_space:
  lookback: [20, 50, 100]
  range_multiplier: [0.25, 0.5, 1.0]
maximum_parameter_sets: 100
costs:
  spread_bps: 2
  commission_bps: 0.5
  slippage_bps: 1
risk:
  max_drawdown: 0.25
walkforward:
  mode: rolling
  train_bars: 500
  test_bars: 125
  embargo_bars: 1
  step_bars: 125
  minimum_rows: 626
created_at: "2026-06-28T00:00:00Z"
