id: mean_reversion_after_large_down_bar_intraday_session_flat_v1
name: Mean Reversion After Large Down Bar Intraday Session Flat
description: Intraday 5m session-flat scoring variant of the existing mean-reversion template.
hypothesis_version: 1
market_universe: us_test_5_intraday_smoke
instrument_type: stock
symbol_filter: "*"
timeframe: 5m
data_source: eodhd
template: mean_reversion_after_large_down_day
signal_family: mean_reversion_after_large_down_day
direction: long_only
entry_logic: Long after a prior 5m bar loss exceeds a configured threshold.
exit_logic: Hold for a fixed number of 5m bars; session-flat overlay forces flat before close.
holding_period: Intraday fixed hold expressed in 5m bars.
expected_edge_reason: >
  A liquid-stock intraday large-down-bar mean-reversion signal may be worth
  rejecting or studying only after session-flat scoring and higher intraday costs.
invalidation_rules:
  - Rejected if net test return is not positive after intraday costs.
  - Rejected if train-side selection fails.
  - Rejected if the session-flat scored positions are not compliant.
  - Rejected if trade count is too low.
minimum_evidence:
  min_trades: 20
  min_profitable_split_pct: 0.6
  min_stability_score: 0.5
holding_policy:
  preferred_style: intraday
  allow_intraday: true
  allow_overnight: false
  allow_weekend: false
  max_holding_sessions: 1
  flatten_before_close_minutes: 10
  entry_cutoff_before_close_minutes: 30
  require_exceptional_evidence_for_swing: true
  require_gap_risk_report: true
  max_gap_return_contribution_pct: 0.0
  max_weekend_exposure_count: 0
  max_overnight_exposure_count: 0
parameter_space:
  down_threshold: [-0.0025, -0.005]
  hold_bars: [3, 6]
maximum_parameter_sets: 4
costs:
  spread_bps: 3
  commission_bps: 0.5
  slippage_bps: 3
risk:
  max_drawdown: 0.25
walkforward:
  mode: rolling
  train_bars: 3900
  test_bars: 780
  embargo_bars: 1
  step_bars: 3900
  minimum_rows: 4681
created_at: "2026-06-28T00:00:00Z"
